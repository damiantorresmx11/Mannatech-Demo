<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00A88F" fill-opacity="0.08"/>
  <!-- Female avatar placeholder (variant) -->
  <g transform="translate(200,180)" fill="none" stroke="#00A88F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-55" r="60" fill="#00A88F" fill-opacity="0.18" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Hair (upswept/bun style) -->
    <path d="M-60,-70 Q-65,-130 0,-145 Q65,-130 60,-70 Q48,-105 0,-108 Q-48,-105 -60,-70 Z" fill="#00A88F" fill-opacity="0.3" stroke="#00A88F" stroke-width="2"/>
    <!-- Bun detail -->
    <circle cx="0" cy="-148" r="18" fill="#00A88F" fill-opacity="0.25" stroke="#00A88F" stroke-width="2"/>
    <!-- Side wisps -->
    <path d="M-60,-70 Q-70,-35 -62,5" stroke="#00A88F" stroke-width="1.8" fill="none"/>
    <path d="M60,-70 Q70,-35 62,5" stroke="#00A88F" stroke-width="1.8" fill="none"/>
    <!-- Face features -->
    <ellipse cx="-20" cy="-58" rx="8" ry="9" fill="#00A88F" fill-opacity="0.5"/>
    <ellipse cx="20" cy="-58" rx="8" ry="9" fill="#00A88F" fill-opacity="0.5"/>
    <!-- Eyelashes hint -->
    <line x1="-26" y1="-68" x2="-30" y2="-73" stroke="#00A88F" stroke-width="1.5"/>
    <line x1="-20" y1="-68" x2="-20" y2="-74" stroke="#00A88F" stroke-width="1.5"/>
    <line x1="14" y1="-68" x2="10" y2="-73" stroke="#00A88F" stroke-width="1.5"/>
    <line x1="20" y1="-68" x2="20" y2="-74" stroke="#00A88F" stroke-width="1.5"/>
    <!-- Smile -->
    <path d="M-18,-28 Q0,-13 18,-28" stroke="#00A88F" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M-5,-38 Q0,-33 5,-38" stroke="#00A88F" stroke-width="1.5" fill="none"/>
    <!-- Body / shoulders -->
    <path d="M-90,60 Q-88,18 -48,8 Q-24,2 0,2 Q24,2 48,8 Q88,18 90,60 L90,100 L-90,100 Z" fill="#00A88F" fill-opacity="0.15" stroke="#00A88F" stroke-width="2.5"/>
    <!-- V-neck detail -->
    <path d="M-22,2 Q0,28 22,2" stroke="#00A88F" stroke-width="2" fill="none"/>
  </g>
  <text x="200" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#262626">Ana Sofía Mendoza</text>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00A88F">Distribuidora</text>
</svg>