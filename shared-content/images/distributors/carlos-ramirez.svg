<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00A88F" fill-opacity="0.08"/>
  <!-- Male avatar placeholder -->
  <g transform="translate(200,180)" fill="none" stroke="#00A88F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-55" r="60" fill="#00A88F" fill-opacity="0.18" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Short hair (masculine) -->
    <path d="M-60,-70 Q-58,-125 0,-132 Q58,-125 60,-70 Q50,-95 0,-98 Q-50,-95 -60,-70 Z" fill="#00A88F" fill-opacity="0.3" stroke="#00A88F" stroke-width="2"/>
    <!-- Face features -->
    <ellipse cx="-20" cy="-60" rx="8" ry="9" fill="#00A88F" fill-opacity="0.5"/>
    <ellipse cx="20" cy="-60" rx="8" ry="9" fill="#00A88F" fill-opacity="0.5"/>
    <!-- Smile -->
    <path d="M-16,-30 Q0,-18 16,-30" stroke="#00A88F" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M-5,-40 Q0,-35 5,-40" stroke="#00A88F" stroke-width="1.5" fill="none"/>
    <!-- Ears -->
    <ellipse cx="-62" cy="-55" rx="10" ry="14" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2"/>
    <ellipse cx="62" cy="-55" rx="10" ry="14" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2"/>
    <!-- Body / shoulders (broader, masculine) -->
    <path d="M-100,60 Q-100,15 -60,5 Q-30,0 0,0 Q30,0 60,5 Q100,15 100,60 L100,100 L-100,100 Z" fill="#00A88F" fill-opacity="0.15" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Collar/shirt -->
    <path d="M-28,0 L-15,30 L0,20 L15,30 L28,0" stroke="#00A88F" stroke-width="2" fill="#00A88F" fill-opacity="0.1"/>
  </g>
  <text x="200" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">Carlos Ramírez</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00A88F">Distribuidor</text>
</svg>