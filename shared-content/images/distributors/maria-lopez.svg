<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00A88F" fill-opacity="0.08"/>
  <!-- Female avatar placeholder -->
  <g transform="translate(200,180)" fill="none" stroke="#00A88F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head -->
    <circle cx="0" cy="-55" r="60" fill="#00A88F" fill-opacity="0.18" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Hair (longer, feminine) -->
    <path d="M-60,-55 Q-72,-110 -42,-130 Q0,-148 42,-130 Q72,-110 60,-55 Q50,-88 0,-90 Q-50,-88 -60,-55 Z" fill="#00A88F" fill-opacity="0.3" stroke="#00A88F" stroke-width="2"/>
    <!-- Side hair strands -->
    <path d="M-60,-55 Q-75,-20 -65,20" stroke="#00A88F" stroke-width="2" fill="none"/>
    <path d="M60,-55 Q75,-20 65,20" stroke="#00A88F" stroke-width="2" fill="none"/>
    <!-- Face features -->
    <ellipse cx="-20" cy="-60" rx="8" ry="9" fill="#00A88F" fill-opacity="0.5"/>
    <ellipse cx="20" cy="-60" rx="8" ry="9" fill="#00A88F" fill-opacity="0.5"/>
    <!-- Smile -->
    <path d="M-18,-30 Q0,-15 18,-30" stroke="#00A88F" stroke-width="2" fill="none"/>
    <!-- Nose -->
    <path d="M-5,-40 Q0,-35 5,-40" stroke="#00A88F" stroke-width="1.5" fill="none"/>
    <!-- Body / shoulders -->
    <path d="M-90,60 Q-90,20 -50,10 Q-25,5 0,5 Q25,5 50,10 Q90,20 90,60 L90,100 L-90,100 Z" fill="#00A88F" fill-opacity="0.15" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Neckline -->
    <path d="M-25,5 Q0,25 25,5" stroke="#00A88F" stroke-width="2" fill="none"/>
  </g>
  <text x="200" y="325" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">María López</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00A88F">Distribuidora</text>
</svg>