<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#E21C1F" fill-opacity="0.08"/>
  <!-- Protein sachet icon -->
  <g transform="translate(200,185)" fill="none" stroke="#E21C1F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Sachet body (wider) -->
    <path d="M-75,-80 L75,-80 L90,90 L-90,90 Z" fill="#E21C1F" fill-opacity="0.12" stroke="#E21C1F" stroke-width="3"/>
    <!-- Top seal -->
    <rect x="-75" y="-100" width="150" height="26" rx="6" fill="#E21C1F" fill-opacity="0.25" stroke="#E21C1F" stroke-width="3"/>
    <!-- Bottom seal -->
    <line x1="-90" y1="80" x2="90" y2="80" stroke="#E21C1F" stroke-width="3"/>
    <!-- Protein muscle/dumbbell icon -->
    <rect x="-40" y="-20" width="80" height="18" rx="4" fill="#E21C1F" fill-opacity="0.4"/>
    <rect x="-55" y="-35" width="20" height="48" rx="6" fill="#E21C1F" fill-opacity="0.35"/>
    <rect x="35" y="-35" width="20" height="48" rx="6" fill="#E21C1F" fill-opacity="0.35"/>
    <rect x="-65" y="-28" width="16" height="34" rx="5" fill="#E21C1F" fill-opacity="0.25" stroke="#E21C1F" stroke-width="2"/>
    <rect x="49" y="-28" width="16" height="34" rx="5" fill="#E21C1F" fill-opacity="0.25" stroke="#E21C1F" stroke-width="2"/>
    <!-- Label lines -->
    <line x1="-50" y1="30" x2="50" y2="30" stroke="#E21C1F" stroke-width="1.5"/>
    <line x1="-50" y1="48" x2="50" y2="48" stroke="#E21C1F" stroke-width="1.5"/>
  </g>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">OsoLean</text>
  <text x="200" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#E21C1F">Peso y Fitness</text>
</svg>