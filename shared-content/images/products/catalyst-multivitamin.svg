<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00529D" fill-opacity="0.08"/>
  <!-- Capsule bottle icon -->
  <g transform="translate(200,182)" fill="none" stroke="#00529D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wide bottle body -->
    <rect x="-52" y="-72" width="104" height="148" rx="16" fill="#00529D" fill-opacity="0.12" stroke="#00529D" stroke-width="3"/>
    <!-- Bottle cap -->
    <rect x="-38" y="-98" width="76" height="32" rx="14" fill="#00529D" fill-opacity="0.3" stroke="#00529D" stroke-width="3"/>
    <!-- Vitamin label -->
    <rect x="-40" y="-42" width="80" height="65" rx="6" fill="#00529D" fill-opacity="0.18" stroke="#00529D" stroke-width="1.5"/>
    <text x="0" y="-16" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#00529D" stroke="none">MULTI</text>
    <text x="0" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#00529D" stroke="none">VITAMIN</text>
    <!-- Star badge -->
    <polygon points="0,15 4,25 15,25 7,32 10,43 0,36 -10,43 -7,32 -15,25 -4,25" fill="#00529D" fill-opacity="0.4" stroke="#00529D" stroke-width="1"/>
    <!-- Bottom capsule shapes -->
    <ellipse cx="0" cy="52" rx="22" ry="10" fill="#00529D" fill-opacity="0.3"/>
  </g>
  <text x="200" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="600" fill="#262626">Catalyst Multivitamin</text>
  <text x="200" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00529D">Nutrición Esencial</text>
</svg>