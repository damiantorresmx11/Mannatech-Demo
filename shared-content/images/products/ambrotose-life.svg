  <text x="200" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">Ambrotose LIFE</text>
  <text x="200" y="333" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00A88F">Salud Integrativa</text>
