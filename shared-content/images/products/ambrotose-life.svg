<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00A88F" fill-opacity="0.1"/>
  <!-- Powder container icon -->
  <g transform="translate(200,175)" fill="none" stroke="#00A88F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Container body -->
    <rect x="-55" y="-80" width="110" height="130" rx="12" fill="#00A88F" fill-opacity="0.15" stroke="#00A88F" stroke-width="3"/>
    <!-- Lid -->
    <rect x="-60" y="-100" width="120" height="28" rx="10" fill="#00A88F" fill-opacity="0.3" stroke="#00A88F" stroke-width="3"/>
    <!-- Label area -->
    <rect x="-40" y="-55" width="80" height="60" rx="6" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2"/>
    <!-- Label lines -->
    <line x1="-28" y1="-35" x2="28" y2="-35" stroke="#00A88F" stroke-width="2"/>
    <line x1="-28" y1="-20" x2="28" y2="-20" stroke="#00A88F" stroke-width="2"/>
    <line x1="-28" y1="-5" x2="20" y2="-5" stroke="#00A88F" stroke-width="2"/>
