<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00529D" fill-opacity="0.08"/>
  <!-- Coffee sachet icon -->
  <g transform="translate(200,185)" fill="none" stroke="#00529D" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Sachet body -->
    <path d="M-65,-80 L65,-80 L75,85 L-75,85 Z" fill="#00529D" fill-opacity="0.12" stroke="#00529D" stroke-width="3"/>
    <!-- Top seal -->
    <rect x="-65" y="-100" width="130" height="26" rx="6" fill="#00529D" fill-opacity="0.25" stroke="#00529D" stroke-width="3"/>
    <!-- Tear notch -->
    <path d="M50,-100 L65,-100 L65,-80 L57,-80" stroke="#00529D" stroke-width="2" fill="none"/>
    <!-- Coffee cup icon inside sachet -->
    <path d="M-28,-30 L-35,50 L35,50 L28,-30 Z" fill="#00529D" fill-opacity="0.2" stroke="#00529D" stroke-width="2"/>
    <!-- Cup handle -->
    <path d="M28,-10 Q55,-10 55,15 Q55,40 28,40" stroke="#00529D" stroke-width="2.5" fill="none"/>
    <!-- Steam lines -->
    <path d="M-15,-40 Q-10,-55 -15,-68" stroke="#00529D" stroke-width="2" fill="none"/>
    <path d="M0,-38 Q5,-55 0,-70" stroke="#00529D" stroke-width="2" fill="none"/>
    <path d="M15,-40 Q20,-55 15,-68" stroke="#00529D" stroke-width="2" fill="none"/>
    <!-- Saucer -->
    <ellipse cx="0" cy="50" rx="42" ry="8" fill="#00529D" fill-opacity="0.2" stroke="#00529D" stroke-width="2"/>
  </g>
  <text x="200" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">GlycoCafé</text>
  <text x="200" y="351" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00529D">Nutrición Esencial</text>
</svg>