<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#66C7EC" fill-opacity="0.1"/>
  <!-- Gel tube icon -->
  <g transform="translate(200,190)" fill="none" stroke="#66C7EC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Horizontal tube body -->
    <path d="M-90,-30 L70,-30 Q90,-30 90,0 Q90,30 70,30 L-90,30 Z" fill="#66C7EC" fill-opacity="0.18" stroke="#66C7EC" stroke-width="3"/>
    <!-- Tube rounded right end (nozzle) -->
    <ellipse cx="90" cy="0" rx="22" ry="30" fill="#66C7EC" fill-opacity="0.3" stroke="#66C7EC" stroke-width="3"/>
    <!-- Nozzle tip -->
    <line x1="112" y1="0" x2="130" y2="0" stroke="#66C7EC" stroke-width="4"/>
    <!-- Left crimp end -->
    <path d="M-90,-30 L-110,-20 L-110,20 L-90,30" fill="#66C7EC" fill-opacity="0.2" stroke="#66C7EC" stroke-width="2.5"/>
    <line x1="-108" y1="-18" x2="-108" y2="18" stroke="#66C7EC" stroke-width="3"/>
    <!-- Label lines on tube -->
    <line x1="-60" y1="-12" x2="50" y2="-12" stroke="#66C7EC" stroke-width="1.5"/>
    <line x1="-60" y1="0" x2="50" y2="0" stroke="#66C7EC" stroke-width="1.5"/>
    <line x1="-60" y1="12" x2="40" y2="12" stroke="#66C7EC" stroke-width="1.5"/>
    <!-- Gel droplet -->
    <path d="M130,-18 Q145,0 130,18" stroke="#66C7EC" stroke-width="2" fill="#66C7EC" fill-opacity="0.25"/>
  </g>
  <text x="200" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">Emprizone</text>
  <text x="200" y="363" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#66C7EC">Cuidado de la Piel</text>
</svg>