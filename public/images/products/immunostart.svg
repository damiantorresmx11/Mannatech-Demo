  </g>
  <text x="200" y="342" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">ImmunoSTART</text>
  <text x="200" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00A88F">Salud Integrativa</text>
