<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#66C7EC" fill-opacity="0.1"/>
  <!-- Tube icon -->
  <g transform="translate(200,185)" fill="none" stroke="#66C7EC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tube body -->
    <rect x="-35" y="-60" width="70" height="120" rx="8" fill="#66C7EC" fill-opacity="0.15" stroke="#66C7EC" stroke-width="3"/>
    <!-- Tube nozzle/cap top -->
    <rect x="-20" y="-88" width="40" height="34" rx="6" fill="#66C7EC" fill-opacity="0.3" stroke="#66C7EC" stroke-width="3"/>
    <!-- Nozzle tip -->
    <rect x="-8" y="-108" width="16" height="24" rx="4" fill="#66C7EC" fill-opacity="0.5" stroke="#66C7EC" stroke-width="2.5"/>
    <!-- Tube bottom crimp -->
    <rect x="-35" y="55" width="70" height="14" rx="3" fill="#66C7EC" fill-opacity="0.3" stroke="#66C7EC" stroke-width="2"/>
    <!-- Label lines on tube -->
    <line x1="-22" y1="-20" x2="22" y2="-20" stroke="#66C7EC" stroke-width="1.5"/>
    <line x1="-22" y1="-5" x2="22" y2="-5" stroke="#66C7EC" stroke-width="1.5"/>
    <line x1="-22" y1="10" x2="18" y2="10" stroke="#66C7EC" stroke-width="1.5"/>
    <!-- Bubble/foam dots -->
    <circle cx="-8" cy="32" r="6" fill="#66C7EC" fill-opacity="0.3"/>
    <circle cx="8" cy="28" r="4" fill="#66C7EC" fill-opacity="0.3"/>
    <circle cx="0" cy="40" r="4" fill="#66C7EC" fill-opacity="0.25"/>
  </g>
  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#262626">üth Facial Cleanser</text>
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#66C7EC">Cuidado de la Piel</text>
</svg>