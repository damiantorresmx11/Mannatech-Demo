<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#00A88F" fill-opacity="0.1"/>
  <!-- Bear gummy icon -->
  <g transform="translate(200,185)" fill="none" stroke="#00A88F" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bear ears -->
    <circle cx="-38" cy="-75" r="20" fill="#00A88F" fill-opacity="0.25" stroke="#00A88F" stroke-width="2.5"/>
    <circle cx="38" cy="-75" r="20" fill="#00A88F" fill-opacity="0.25" stroke="#00A88F" stroke-width="2.5"/>
    <circle cx="-38" cy="-75" r="11" fill="#00A88F" fill-opacity="0.4"/>
    <circle cx="38" cy="-75" r="11" fill="#00A88F" fill-opacity="0.4"/>
    <!-- Bear head -->
    <ellipse cx="0" cy="-38" rx="52" ry="48" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Bear body -->
    <ellipse cx="0" cy="45" rx="48" ry="52" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2.5"/>
    <!-- Arms -->
    <ellipse cx="-52" cy="30" rx="16" ry="28" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2.5" transform="rotate(-15,-52,30)"/>
    <ellipse cx="52" cy="30" rx="16" ry="28" fill="#00A88F" fill-opacity="0.2" stroke="#00A88F" stroke-width="2.5" transform="rotate(15,52,30)"/>
    <!-- Eyes -->
    <circle cx="-18" cy="-45" r="6" fill="#00A88F" fill-opacity="0.7"/>
    <circle cx="18" cy="-45" r="6" fill="#00A88F" fill-opacity="0.7"/>
    <!-- Smile -->
    <path d="M-16,-18 Q0,-6 16,-18" stroke="#00A88F" stroke-width="2.5" fill="none"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-28" rx="8" ry="5" fill="#00A88F" fill-opacity="0.5"/>
  </g>
  <text x="200" y="332" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">MannaBears</text>
  <text x="200" y="355" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00A88F">Salud Integrativa</text>
</svg>