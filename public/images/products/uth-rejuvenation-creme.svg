<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" rx="24" fill="#66C7EC" fill-opacity="0.1"/>
  <!-- Cream jar icon -->
  <g transform="translate(200,185)" fill="none" stroke="#66C7EC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Jar body -->
    <rect x="-62" y="-20" width="124" height="90" rx="10" fill="#66C7EC" fill-opacity="0.15" stroke="#66C7EC" stroke-width="3"/>
    <!-- Jar lid -->
    <rect x="-70" y="-52" width="140" height="38" rx="12" fill="#66C7EC" fill-opacity="0.3" stroke="#66C7EC" stroke-width="3"/>
    <!-- Lid detail line -->
    <line x1="-62" y1="-33" x2="62" y2="-33" stroke="#66C7EC" stroke-width="2"/>
    <!-- Cream swirl inside jar -->
    <path d="M-30,25 Q-15,10 0,25 Q15,40 30,25" stroke="#66C7EC" stroke-width="2.5" fill="none"/>
    <path d="M-20,45 Q-10,32 0,45 Q10,58 20,45" stroke="#66C7EC" stroke-width="2" fill="none"/>
    <!-- Label on jar -->
    <line x1="-40" y1="5" x2="40" y2="5" stroke="#66C7EC" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#66C7EC" stroke="none">üth</text>
  </g>
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#262626">üth Rejuvenation Crème</text>
  <text x="200" y="353" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#66C7EC">Cuidado de la Piel</text>
</svg>