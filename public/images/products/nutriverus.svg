  </g>
  <text x="200" y="322" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#262626">NutriVerus</text>
  <text x="200" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00529D">Nutrición Esencial</text>
