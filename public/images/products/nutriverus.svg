    <line x1="-58" y1="-68" x2="-58" y2="68" stroke="#00529D" stroke-width="3"/>
    <line x1="58" y1="-68" x2="58" y2="68" stroke="#00529D" stroke-width="3"/>
    <ellipse cx="0" cy="68" rx="58" ry="13" fill="#00529D" fill-opacity="0.15" stroke="#00529D" stroke-width="3"/>
    <!-- Lid on top -->
