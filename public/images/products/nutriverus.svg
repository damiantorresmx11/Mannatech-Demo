    <!-- Label band -->
    <rect x="-58" y="-22" width="116" height="62" fill="#00529D" fill-opacity="0.15" stroke="none"/>
    <line x1="-58" y1="-22" x2="58" y2="-22" stroke="#00529D" stroke-width="1.5"/>
    <line x1="-58" y1="40" x2="58" y2="40" stroke="#00529D" stroke-width="1.5"/>
